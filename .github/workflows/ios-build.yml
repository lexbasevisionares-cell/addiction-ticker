name: iOS Cloud Build

on:
  push:
    branches:
      - main
  workflow_dispatch: # Allows manual trigger

jobs:
  build_ios:
    name: Build iOS Archive
    runs-on: macos-latest # This provides the Mac environment with Xcode

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install NPM Dependencies
        run: npm ci

      - name: Build Web App (Vite)
        run: npm run build

      - name: Sync Capacitor iOS
        run: npx cap sync ios

      - name: Build iOS App with Xcode
        working-directory: ./ios/App
        run: |
          xcodebuild archive \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -archivePath $PWD/build/App.xcarchive \
            -allowProvisioningUpdates \
            CODE_SIGNING_ALLOWED=NO CODE_SIGN_IDENTITY="" # Bypasses signing for now to test the build

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-archive
          path: ios/App/build/App.xcarchive
